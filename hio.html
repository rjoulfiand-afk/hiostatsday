<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIO STATSDAY - VIP Portal</title>
    <meta property="og:title" content="HIO STATSDAY by JulDev">
    <meta property="og:description" content="Portal laporan dan statistik terpusat.">
    <meta property="og:image" content="https://rjoulfiand-afk.github.io/vvyora/uw.jpg">
    <meta property="og:url" content="https://rjoulfiand-afk.github.io/vvyora/">
    <meta property="og:type" content="website">

    <!-- Font elegan dan bersih -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* 🛠️ MEKANIK AESTHETIC PASTEL VVIP */
            --text-dark: #1e293b;
            --text-soft: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.65);
            --shadow-soft: 0 30px 60px rgba(162, 171, 189, 0.3);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            --accent-1: #a1c4fd; /* Soft Blue */
            --accent-2: #c2e9fb; /* Light Cyan */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow: hidden; 
            background: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Blobs Efek Bokeh/Blur */
        .blob { position: absolute; filter: blur(80px); z-index: 0; opacity: 0.6; border-radius: 50%; animation: floatBlob 10s ease-in-out infinite alternate; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #e0c3fc; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #8ec5fc; animation-delay: -5s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* Pintu Gerbang Utama */
        .lobby-container {
            width: 100%; max-width: 440px; /* Sedikit dilebarin biar lega di HP flagship */
            background: var(--glass-bg);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: var(--shadow-soft), inset 0 0 0 1px rgba(255,255,255,0.9);
            padding: 50px 35px; text-align: center;
            position: relative; z-index: 1;
            animation: smoothFadeUp 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes smoothFadeUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        .lobby-container.exiting { animation: smoothFadeDown 0.6s ease-in forwards; }
        @keyframes smoothFadeDown { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.95); filter: blur(10px); } }

        /* Avatar VIP */
        .avatar-frame {
            width: 115px; height: 115px; margin: 0 auto 25px; 
            position: relative; border-radius: 50%; padding: 5px;
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            box-shadow: 0 15px 35px rgba(161, 196, 253, 0.5), inset 0 2px 5px rgba(255,255,255,1);
            animation: gentleFloat 4s ease-in-out infinite;
        }
        @keyframes gentleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); box-shadow: 0 25px 45px rgba(161, 196, 253, 0.6), inset 0 2px 5px rgba(255,255,255,1); } }

        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #ffffff; }

        /* Typography Mewah */
        .lobby-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; letter-spacing: 0.5px; }
        .lobby-subtitle { font-size: 13px; color: var(--text-soft); font-weight: 600; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        /* Grid Pilihan Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

        /* Kartu Menu Estetik */
        .menu-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 22px; padding: 18px 22px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: var(--transition);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
            
            /* Animasi Masuk Air Terjun (Cascading) */
            opacity: 0; transform: translateY(20px);
            animation: cardEntrance 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        @keyframes cardEntrance { to { opacity: 1; transform: translateY(0); } }
        
        .menu-card:nth-child(1) { animation-delay: 0.2s; }
        .menu-card:nth-child(2) { animation-delay: 0.3s; }
        .menu-card:nth-child(3) { animation-delay: 0.4s; }
        .menu-card:nth-child(4) { animation-delay: 0.5s; }

        /* Efek Hover Kasta Sultan */
        .menu-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 35px rgba(161, 196, 253, 0.4), inset 0 0 0 1px rgba(255,255,255,1);
            border-color: transparent;
        }
        .menu-card:active { transform: translateY(1px) scale(0.98); }

        .card-icon {
            width: 50px; height: 50px; border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); 
            color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 20px; transition: var(--transition);
            box-shadow: 0 8px 15px rgba(161, 196, 253, 0.4);
        }
        .menu-card:hover .card-icon { transform: scale(1.1) rotate(-8deg); box-shadow: 0 12px 20px rgba(161, 196, 253, 0.6); }

        .card-text { text-align: left; flex: 1; margin-left: 18px; }
        .card-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
        .card-desc { font-size: 12px; color: var(--text-soft); font-weight: 500; }

        .card-arrow { color: #cbd5e0; font-size: 16px; transition: var(--transition); }
        .menu-card:hover .card-arrow { color: var(--accent-1); transform: translateX(6px); }

        /* Loader Overlay Smooth */
        .card-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: var(--accent-1);
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
            z-index: 5; border-radius: 22px;
        }
        .menu-card.loading .card-loader { opacity: 1; visibility: visible; }

        /* Label Elegant VVIP (Pulsing Glow) */
        .badge-hot {
            position: absolute; top: 12px; right: 12px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff; font-size: 9px; font-weight: 800; padding: 4px 12px;
            border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.5);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0.6); } 
            70% { box-shadow: 0 0 0 8px rgba(255, 154, 158, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0); } 
        }

        /* Responsif HP Kecil */
        @media screen and (max-width: 400px) {
            .lobby-container { padding: 40px 25px; }
            .lobby-title { font-size: 26px; }
            .card-icon { width: 45px; height: 45px; font-size: 18px; }
            .card-title { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="lobby-container" id="lobbyBox">
        <div class="admin-profile">
            <div class="avatar-frame">
                <!-- Pastikan file hio.jpg ada di folder lur -->
                <img src="hio.jpg" class="avatar-img" alt="HIO STATSDAY Profile">
            </div>
            <h1 class="lobby-title">HIO STATSDAY</h1>
            <p class="lobby-subtitle">Executive Portal</p>
        </div>

        <div class="menu-grid">
            
            <!-- Menu 1: Top Management -->
            <div class="menu-card" onclick="goToPage(this, 'cekacc.html')">
                <div class="card-loader"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="card-icon"><i class="fas fa-sitemap"></i></div>
                <div class="card-text">
                    <div class="card-title">Top Management</div>
                    <div class="card-desc">Struktur organisasi utama</div>
                </div>
                <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>

            <!-- Menu 2: Daftar -->
            <div class="menu-card" onclick="goToPage(this, 'vyoraa.html')">
                <div class="badge-hot">VVIP</div>
                <div class="card-loader"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="card-icon"><i class="fas fa-clipboard-list"></i></div>
                <div class="card-text">
                    <div class="card-title">Daftar</div>
                    <div class="card-desc">Registrasi dan pendaftaran</div>
                </div>
                <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
            
            <!-- Menu 3: Pemasukan -->
            <div class="menu-card" onclick="goToPage(this, 'member.html')">
                <div class="card-loader"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="card-icon"><i class="fas fa-wallet"></i></div>
                <div class="card-text">
                    <div class="card-title">Pemasukan</div>
                    <div class="card-desc">Data keuangan Tiap Devisi</div>
                </div>
                <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>

            <!-- Menu 4: Laporan (Nexus Dihapus) -->
            <div class="menu-card" onclick="goToPage(this, 'admindevelop.html')">
                <div class="card-loader"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="card-icon"><i class="fas fa-file-alt"></i></div>
                <div class="card-text">
                    <div class="card-title">Laporan</div>
                    <div class="card-desc">Rekapitulasi data & statistik</div>
                </div>
                <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>

            <!-- Menu 2.5: Cuti VVIP -->
            <div class="menu-card" onclick="goToPage(this, 'cuti.html')">
                <div class="card-loader"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="card-icon"><i class="fas fa-plane-departure"></i></div>
                <div class="card-text">
                    <div class="card-title">Cuti & Izin</div>
                    <div class="card-desc">Boarding pass istirahat</div>
                </div>
                <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>

        </div>
    </div>

    <script>
        function goToPage(cardElement, targetUrl) {
            // Nambahin getaran (haptic feedback) kecil kalau HP user support
            if (navigator.vibrate) navigator.vibrate(50); 
            
            cardElement.classList.add('loading');
            
            setTimeout(() => {
                document.getElementById('lobbyBox').classList.add('exiting');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500); // Waktu diatur biar fade out-nya lebih elegan
            }, 400);
        }
    </script>
</body>
</html>
