<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beri Tugas - HIO STATSDAY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --text-dark: #0f172a;
            --text-soft: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.8);
            --accent-1: #a1c4fd; 
            --accent-2: #c2e9fb; 
            --success: #10b981;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px;
            background: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden; overflow-y: auto;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        /* Blobs Background */
        .blob { position: fixed; filter: blur(80px); z-index: -1; opacity: 0.6; border-radius: 50%; animation: floatBlob 10s ease-in-out infinite alternate; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #e0c3fc; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #8ec5fc; animation-delay: -5s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* Command Center Container */
        .form-container {
            width: 100%; max-width: 550px; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(162, 171, 189, 0.3), inset 0 0 0 1px rgba(255,255,255,0.9);
            animation: smoothFadeUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            position: relative;
        }
        @keyframes smoothFadeUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Header Mewah */
        .header { text-align: center; margin-bottom: 40px; position: relative; }
        
        .header-badge {
            display: inline-block; background: linear-gradient(135deg, #1e293b, #475569);
            color: #fff; font-size: 10px; font-weight: 800; padding: 5px 15px;
            border-radius: 20px; letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(30, 41, 59, 0.3);
        }

        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; letter-spacing: 0.5px;}
        .header p { font-size: 13px; font-weight: 500; color: var(--text-soft); }
        
        .btn-back {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            background: #ffffff; color: var(--text-dark);
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center; font-size: 18px;
            text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: var(--transition);
        }
        .btn-back:hover { background: var(--text-dark); color: #fff; transform: translateY(-50%) scale(1.08); }

        /* Input Fields - Neumorphic Style */
        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block; font-size: 11px; font-weight: 800; margin-bottom: 8px;
            color: var(--text-soft); padding-left: 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        .input-wrapper { position: relative; }
        
        /* Ikon bergradasi */
        .input-wrapper i.icon-left {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 16px; transition: var(--transition); z-index: 2;
        }

        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 18px;
            padding: 16px 15px 16px 50px; /* Padding kiri lega buat ikon */
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
            color: var(--text-dark); transition: var(--transition); outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .form-control::placeholder { color: #94a3b8; font-weight: 500; }
        
        /* Glow Effect Pas Diketik */
        .form-control:focus {
            background: #ffffff; border-color: transparent;
            box-shadow: 0 0 0 4px rgba(161, 196, 253, 0.3), 0 10px 20px rgba(161, 196, 253, 0.1);
            transform: translateY(-2px);
        }
        .form-control:focus + i.icon-left, .input-wrapper:focus-within i.icon-left { transform: translateY(-50%) scale(1.15); }

        /* Dropdown & Textarea Fix */
        select.form-control { appearance: none; cursor: pointer; }
        .select-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-soft); pointer-events: none; font-size: 12px; }
        textarea.form-control { padding-top: 18px; resize: none; height: 140px; line-height: 1.6; }
        .textarea-wrapper i.icon-left { top: 26px; }

        /* Premium Submit Button */
        .btn-submit {
            width: 100%; margin-top: 10px; padding: 18px;
            background: linear-gradient(135deg, var(--text-dark) 0%, #475569 100%);
            color: #ffffff; border: none; border-radius: 20px;
            font-size: 14px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;
            text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; transition: var(--transition);
            box-shadow: 0 15px 30px rgba(30, 41, 59, 0.3), inset 0 2px 0 rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center; gap: 12px;
            position: relative; overflow: hidden;
        }
        
        /* Efek Kilap di Tombol */
        .btn-submit::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s ease;
        }
        .btn-submit:hover::after { left: 100%; }
        
        .btn-submit:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(30, 41, 59, 0.4); }
        .btn-submit:active { transform: translateY(1px); box-shadow: 0 5px 15px rgba(30, 41, 59, 0.3); }

        /* 🔥 NOTIFIKASI FLOATING (iOS STYLE) 🔥 */
        .toast-notification { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,1);
            color: var(--text-dark); padding: 14px 25px; border-radius: 20px; 
            font-size: 13px; font-weight: 700; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px; z-index: 9999;
            transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .toast-notification.show { top: 30px; }
        .toast-icon { color: var(--success); font-size: 18px; }

        /* Responsif HP */
        @media screen and (max-width: 600px) {
            .form-container { padding: 45px 25px; border-radius: 35px; }
            .header h1 { font-size: 26px; }
            .btn-back { position: relative; left: auto; top: auto; transform: none; margin: 0 auto 20px; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Floating Toast Notification -->
    <div id="toastNotif" class="toast-notification">
        <i class="fas fa-check-circle toast-icon"></i> 
        <span>Instruksi tugas berhasil ditambahkan!</span>
    </div>

    <div class="form-container">
        
        <!-- Header -->
        <div class="header">
            <a href="hio.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-badge"><i class="fas fa-terminal"></i> Owner Terminal</div>
            <h1>Beri Tugas</h1>
            <p>Kirim instruksi ke papan kontrol divisi</p>
        </div>

        <!-- Form Area -->
        <form id="formTugas">
            
            <div class="input-group">
                <label>Pilih Divisi Target</label>
                <div class="input-wrapper">
                    <select id="inDivisi" class="form-control" required>
                        <option value="" disabled selected>Kirim tugas ke divisi mana?</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin System</option>
                        <option value="Staff">Staff Divisi</option>
                        <option value="ELV">Divisi ELV</option>
                    </select>
                    <i class="fas fa-sitemap icon-left"></i>
                    <i class="fas fa-chevron-down select-arrow"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Detail Instruksi Tugas</label>
                <div class="input-wrapper textarea-wrapper">
                    <textarea id="inTugas" class="form-control" placeholder="Ketik rincian instruksi kerja disini dengan jelas..." required></textarea>
                    <i class="fas fa-clipboard-list icon-left"></i>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Deploy Tugas
            </button>

        </form>
    </div>

    <script>
        document.getElementById('formTugas').addEventListener('submit', function(e) {
            e.preventDefault();
            let divisi = document.getElementById('inDivisi').value;
            let teksTugas = document.getElementById('inTugas').value;
            let uniqId = Date.now(); 
            
            // Generate Waktu
            let now = new Date();
            let tanggal = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            let jam = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            let timestamp = `${tanggal} | ${jam} WIB`;

            // Buka Brankas Lokal
            let dbTugas = JSON.parse(localStorage.getItem('hio_task_db')) || { "Manager": [], "Admin": [], "Staff": [], "ELV": [] };
            
            // Masukin Data Baru
            dbTugas[divisi].push({ id: uniqId, teks: teksTugas, waktu: timestamp });
            localStorage.setItem('hio_task_db', JSON.stringify(dbTugas));

            // Reset Form 
            document.getElementById('formTugas').reset();

            // Munculin Notifikasi Ala iPhone (Drop dari atas)
            let toast = document.getElementById('toastNotif');
            toast.classList.add('show');
            
            // Haptic Feedback (Kalau HP support)
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            // Ilangin notif setelah 3 detik
            setTimeout(() => { 
                toast.classList.remove('show'); 
            }, 3000);
        });
    </script>
</body>
</html>
