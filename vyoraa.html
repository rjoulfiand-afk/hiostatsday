<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Rekrutmen - HIO STATSDAY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --text-dark: #0f172a;
            --text-soft: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --accent-1: #a1c4fd; 
            --accent-2: #c2e9fb; 
            --accent-vip: #ff9a9e;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px;
            background: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden; overflow-y: auto;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        /* Blobs Background */
        .blob { position: fixed; filter: blur(80px); z-index: -1; opacity: 0.6; border-radius: 50%; animation: floatBlob 10s ease-in-out infinite alternate; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #e0c3fc; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #8ec5fc; animation-delay: -5s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* Form Container - VIP ID Card Edition */
        .form-container {
            width: 100%; max-width: 650px; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 55px 45px 45px;
            box-shadow: 0 30px 60px rgba(162, 171, 189, 0.4), inset 0 0 0 1px rgba(255,255,255,1);
            animation: smoothFadeUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            position: relative; margin-top: 30px; /* Jarak untuk avatar melayang */
        }
        @keyframes smoothFadeUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* 🔥 AVATAR FOTO (HIO.JPG) 🔥 */
        .avatar-glow {
            width: 110px; height: 110px;
            position: absolute; top: -55px; left: 50%; transform: translateX(-50%);
            border-radius: 50%; padding: 4px;
            background: linear-gradient(135deg, var(--accent-vip), var(--accent-1), var(--accent-2));
            box-shadow: 0 15px 35px rgba(161, 196, 253, 0.5);
            animation: floatAvatar 4s ease-in-out infinite;
            z-index: 10;
        }
        .avatar-glow img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid #ffffff; background: #fff;
        }
        @keyframes floatAvatar { 
            0%, 100% { transform: translate(-50%, 0); } 
            50% { transform: translate(-50%, -8px); box-shadow: 0 20px 45px rgba(161, 196, 253, 0.7); } 
        }

        /* Header Mewah */
        .header { text-align: center; margin-top: 35px; margin-bottom: 35px; position: relative; }
        
        .header-badge {
            display: inline-block; background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #fff; font-size: 10px; font-weight: 800; padding: 5px 15px;
            border-radius: 20px; letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
        }

        .header h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; letter-spacing: 0.5px;}
        .header p { font-size: 13px; font-weight: 500; color: var(--text-soft); }
        
        .btn-back {
            position: absolute; left: 0; top: 0; 
            background: #ffffff; color: var(--text-dark);
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; font-size: 16px;
            text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: var(--transition);
        }
        .btn-back:hover { background: var(--accent-1); color: #fff; transform: scale(1.08) rotate(-5deg); }

        /* Grid Form Layout */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row-full { grid-template-columns: 1fr; margin-bottom: 20px; }

        /* Input Fields - Neumorphic Premium */
        .input-group label {
            display: block; font-size: 11px; font-weight: 800; margin-bottom: 8px;
            color: var(--text-soft); padding-left: 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        .input-wrapper { position: relative; }
        
        .input-wrapper i.icon-left {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 16px; transition: var(--transition); z-index: 2;
        }

        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.9); border-radius: 18px;
            padding: 15px 15px 15px 50px; 
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
            color: var(--text-dark); transition: var(--transition); outline: none;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
        }
        
        .form-control::placeholder { color: #94a3b8; font-weight: 500; }
        
        /* Animasi Fokus Glow */
        .form-control:focus {
            background: #ffffff; border-color: transparent;
            box-shadow: 0 0 0 4px rgba(161, 196, 253, 0.25), 0 10px 20px rgba(161, 196, 253, 0.15);
            transform: translateY(-2px);
        }
        .form-control:focus + i.icon-left, .input-wrapper:focus-within i.icon-left { transform: translateY(-50%) scale(1.15); }

        /* Textarea Fix */
        textarea.form-control { padding-top: 18px; resize: none; height: 110px; }
        .textarea-wrapper i.icon-left { top: 25px; }

        /* Dropdown Fix */
        select.form-control { appearance: none; cursor: pointer; }
        .select-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-soft); pointer-events: none; font-size: 12px; }

        /* Tombol Submit Kasta Sultan */
        .btn-submit {
            width: 100%; margin-top: 15px; padding: 18px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            color: #0f172a; border: none; border-radius: 20px;
            font-size: 15px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: var(--transition);
            box-shadow: 0 15px 30px rgba(161, 196, 253, 0.4), inset 0 2px 0 rgba(255,255,255,0.6);
            display: flex; justify-content: center; align-items: center; gap: 12px;
            position: relative; overflow: hidden;
        }
        
        /* Efek Kilap / Shine Sweep */
        .btn-submit::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: all 0.6s ease;
        }
        .btn-submit:hover::after { left: 100%; }
        
        .btn-submit:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(161, 196, 253, 0.6); }
        .btn-submit:active { transform: translateY(1px); box-shadow: 0 5px 15px rgba(161, 196, 253, 0.4); }

        /* 🔥 OPTIMASI HP (RESPONSIVE ANTI-BERANTAKAN) 🔥 */
        @media screen and (max-width: 600px) {
            body { padding: 60px 15px 30px; } /* Jarak atas ditambahin buat space avatar melayang */
            .form-container { padding: 60px 25px 35px; border-radius: 35px; }
            .form-row { grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; } /* Paksa tumpuk 1 kolom rapi */
            .header h1 { font-size: 24px; }
            
            /* Avatar dikecilin dikit biar proporsional di HP */
            .avatar-glow { width: 95px; height: 95px; top: -47px; } 
            
            /* Tombol back dipindah ke atas foto biar ga nabrak */
            .btn-back { position: absolute; left: 0; top: -15px; width: 38px; height: 38px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="form-container">
        
        <!-- 🔥 FOTO PROFIL MELAYANG 🔥 -->
        <div class="avatar-glow">
            <!-- Pastikan file hio.jpg ada di folder yang sama lur! -->
            <img src="hio.jpg" alt="HIO Profile">
        </div>

        <!-- Header -->
        <div class="header">
            <a href="hio.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-badge">Open Recruitment</div>
            <h1>Join HIO STATSDAY</h1>
            <p>Formulir Eksklusif Calon Admin & Staff</p>
        </div>

        <!-- Form Area -->
        <form id="regForm">
            
            <!-- Baris 1: Nama & Username (Kiri - Kanan di PC, Atas - Bawah di HP) -->
            <div class="form-row">
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <div class="input-wrapper">
                        <input type="text" id="inNama" class="form-control" placeholder="Nama asli kamu" required>
                        <i class="fas fa-user icon-left"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label>Username Tele</label>
                    <div class="input-wrapper">
                        <input type="text" id="inUname" class="form-control" placeholder="@username" required>
                        <i class="fab fa-telegram-plane icon-left"></i>
                    </div>
                </div>
            </div>

            <!-- Baris 2: Umur & Role -->
            <div class="form-row">
                <div class="input-group">
                    <label>Usia</label>
                    <div class="input-wrapper">
                        <input type="number" id="inUmur" class="form-control" placeholder="Contoh: 18" required>
                        <i class="fas fa-calendar-alt icon-left"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label>Pilih Posisi</label>
                    <div class="input-wrapper">
                        <select id="inRole" class="form-control" required>
                            <option value="" disabled selected>Pilih role...</option>
                            <option value="Admin System">Admin System</option>
                            <option value="Staff Divisi">Staff Divisi</option>
                        </select>
                        <i class="fas fa-briefcase icon-left"></i>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>
            </div>

            <!-- Baris 3: Jam Kerja (Full Lebar) -->
            <div class="form-row form-row-full">
                <div class="input-group">
                    <label>Jam Online / Waktu Aktif</label>
                    <div class="input-wrapper">
                        <input type="text" id="inJam" class="form-control" placeholder="Contoh: Malam hari (19.00 - 23.00 WIB)" required>
                        <i class="fas fa-clock icon-left"></i>
                    </div>
                </div>
            </div>

            <!-- Baris 4: Motivasi (Full Lebar) -->
            <div class="form-row form-row-full">
                <div class="input-group">
                    <label>Alasan Bergabung</label>
                    <div class="input-wrapper textarea-wrapper">
                        <textarea id="inMotivasi" class="form-control" placeholder="Berikan alasan terbaikmu untuk bergabung dengan kami..." required></textarea>
                        <i class="fas fa-comment-dots icon-left"></i>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">Kirim Pendaftaran</span>
                <i class="fas fa-paper-plane" id="btnIcon"></i>
            </button>

        </form>
    </div>

    <script>
        // 🛠️ LOGIKA SAKTI MECHANIK JULDEV (Tembus Telegram @kayynl) 🛠️
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let nama = document.getElementById('inNama').value;
            let uname = document.getElementById('inUname').value;
            let umur = document.getElementById('inUmur').value;
            let role = document.getElementById('inRole').value;
            let jam = document.getElementById('inJam').value;
            let motivasi = document.getElementById('inMotivasi').value;

            let pesanFormat = `Halo kak Kayy! 👋\nSaya ingin mendaftar rekrutmen HIO STATSDAY.\n\n` +
                              `📝 *Data Diri:*\n` +
                              `- Nama: ${nama}\n` +
                              `- Username: ${uname}\n` +
                              `- Umur: ${umur} Tahun\n\n` +
                              `💼 *Posisi Dilamar:*\n` +
                              `- Role: ${role}\n` +
                              `- Jam Aktif: ${jam}\n\n` +
                              `💬 *Motivasi Join:*\n` +
                              `"${motivasi}"`;

            let pesanEncoded = encodeURIComponent(pesanFormat);
            let linkTelegram = `https://t.me/kayynl?text=${pesanEncoded}`;

            window.open(linkTelegram, '_blank');
        });
    </script>
</body>
</html>
