<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Board - HIO STATSDAY</title>
    
    <!-- 👑 FONT SULTAN -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔥 FIREBASE SDK 🔥 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* ========================================================
           ✨ HOLOGRAPHIC AURORA GLASSMORPHISM VVIP ✨
           ======================================================== */
        :root {
            --text-dark: #0f172a; --text-soft: #475569;
            --glass-bg: rgba(255, 255, 255, 0.4); 
            --glass-card: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.8);
            
            /* Warna Akses Divisi Lebih Terang & Premium */
            --c-manager: #ff4b72; --c-admin: #0ea5e9; 
            --c-staff: #10b981;   --c-elv: #f59e0b;
            
            --transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { 
            color: var(--text-dark); min-height: 100vh; 
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            overflow-x: hidden; padding: 20px 30px;
        }

        /* 🌌 BACKGROUND AURORA ANIMATION */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(161, 196, 253, 0.4), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(251, 194, 235, 0.4), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(168, 237, 234, 0.4), transparent 50%);
            filter: blur(60px); animation: auroraMove 15s alternate infinite ease-in-out;
        }
        @keyframes auroraMove { 
            0% { transform: scale(1) translate(0, 0); } 
            100% { transform: scale(1.1) translate(-20px, 20px); } 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        /* 🏛️ MAIN DASHBOARD WRAPPER */
        .dashboard-container { 
            width: 100%; max-width: 1500px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 40px; 
            padding: 30px 40px 50px; box-shadow: 0 40px 100px rgba(15, 23, 42, 0.08), inset 0 0 0 1px rgba(255,255,255,1); 
            animation: smoothFadeUp 1s ease-out forwards; 
        }
        @keyframes smoothFadeUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }

        /* 👑 HEADER PANEL VVIP */
        .header-panel {
            display: flex; justify-content: center; align-items: center; position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
            padding: 20px 30px; border-radius: 30px; border: 1px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03); margin-bottom: 40px;
        }
        .header-title-area { display: flex; flex-direction: column; text-align: center; }
        .header-title-area h1 { font-family: 'Cinzel Decorative', serif; font-size: 34px; font-weight: 900; background: linear-gradient(to right, #0f172a, #475569); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2px;}
        .header-title-area p { font-size: 13px; font-weight: 700; color: var(--accent-1); text-transform: uppercase; letter-spacing: 4px; }
        
        .btn-action-back { 
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%); z-index: 10;
            width: 50px; height: 50px; border-radius: 18px; 
            background: #fff; color: var(--text-dark); font-size: 20px;
            display: flex; justify-content: center; align-items: center; text-decoration: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: var(--transition); border: 1px solid #fff;
        }
        .btn-action-back:hover { background: var(--text-dark); color: #fff; transform: translateY(-50%) scale(1.05) rotate(-5deg); box-shadow: 0 15px 35px rgba(15,23,42,0.2);}

        /* 📊 KANBAN BOARD TRACKS */
        .board-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; align-items: start; }
        .board-col { 
            background: rgba(255, 255, 255, 0.3); border-radius: 30px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.6); box-shadow: inset 0 5px 20px rgba(255,255,255,0.5); 
            display: flex; flex-direction: column; max-height: 680px; position: relative;
        }
        
        /* Area Scroll Tugas */
        .task-list-area { overflow-y: auto; padding-right: 5px; flex: 1; min-height: 200px; padding-top: 5px; }

        /* Judul Kolom Holographic */
        .col-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 20px; margin-bottom: 20px; border-radius: 20px; 
            color: #fff; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 2px 5px rgba(255,255,255,0.3); 
            position: relative; overflow: hidden;
        }
        .col-header::after { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: sweep 3s infinite; }
        @keyframes sweep { 0% {left: -100%;} 50%, 100% {left: 200%;} }

        .col-badge { background: #fff; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        .bg-manager { background: linear-gradient(135deg, #ff4b72 0%, #ff7eb3 100%); }
        .bg-admin { background: linear-gradient(135deg, #0ea5e9 0%, #00f2fe 100%); }
        .bg-staff { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        .bg-elv { background: linear-gradient(135deg, #f59e0b 0%, #fde047 100%); }

        /* ✨ KARTU TUGAS 3D SULTAN ✨ */
        .task-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.7)); 
            border-radius: 22px; padding: 22px; margin-bottom: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: var(--transition); 
            position: relative; border: 1px solid rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }
        .task-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); z-index: 2;}
        
        /* Glowing Accent Line */
        .task-card::before {
            content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 5px;
            border-radius: 0 5px 5px 0; background: var(--card-accent);
            box-shadow: 0 0 15px var(--card-accent); transition: var(--transition);
        }
        .task-card:hover::before { height: 80%; top: 10%; width: 6px; }

        .task-title { font-size: 15px; font-family: 'Plus Jakarta Sans'; font-weight: 800; color: var(--text-dark); margin-bottom: 12px; line-height: 1.5; }
        
        /* ⏳ TIMER DEADLINE CAPSULE ⏳ */
        .task-timer { font-size: 11px; font-family: 'Plus Jakarta Sans'; font-weight: 800; padding: 6px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; transition: var(--transition); letter-spacing: 0.5px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);}
        .timer-safe { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0;}
        .timer-warning { background: #fffbeb; color: #d97706; border: 1px solid #fde68a;}
        .timer-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; animation: pulseDanger 1s infinite; }
        .timer-expired { background: #dc2626; color: #fff; text-decoration: line-through; box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4);}
        @keyframes pulseDanger { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Area Stampel / Checkpoint */
        .done-by-area { border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .badge-done { background: linear-gradient(135deg, #10b981, #34d399); color: #fff; font-size: 10px; font-family: 'Plus Jakarta Sans'; font-weight: 800; padding: 6px 12px; border-radius: 20px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); text-transform: capitalize; display: flex; align-items: center; gap: 4px;}

        /* Action Buttons Neumorphic Pill */
        .task-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px;}
        .btn-neo { flex: 1; padding: 8px 10px; border-radius: 14px; font-size: 11px; font-family: 'Plus Jakarta Sans'; font-weight: 800; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 6px; text-transform: uppercase; border: none; }
        
        .btn-sop { background: #f1f5f9; color: var(--text-soft); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .btn-sop:hover { background: #e2e8f0; color: var(--text-dark); transform: translateY(-2px); }
        
        .btn-acc { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.1); }
        .btn-acc:hover { background: #0ea5e9; color: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3); }

        /* 🔘 FLOATING REPORT BUTTON 🔘 */
        .fab-lapor { position: fixed; bottom: 35px; right: 35px; background: linear-gradient(135deg, #0f172a, #334155); color: #fff; padding: 16px 28px; border-radius: 30px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.4); display: flex; align-items: center; gap: 12px; z-index: 100; transition: var(--transition);}
        .fab-lapor:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 30px 50px rgba(15, 23, 42, 0.5); background: linear-gradient(135deg, #000, #1e293b); }
        .fab-lapor i { color: #f59e0b; font-size: 18px; }

        /* 🔐 MODAL OVERLAY GLASSMORPHISM PRO 🔐 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; opacity: 0; transition: opacity 0.4s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        
        .modal-box { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(255,255,255,1); padding: 45px 40px; border-radius: 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.4); transform: translateY(40px) scale(0.95); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative;}
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
        
        .btn-close-modal { position: absolute; top: 25px; right: 25px; background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 14px; font-size: 18px; color: var(--text-soft); cursor: pointer; transition: var(--transition);}
        .btn-close-modal:hover { background: #fee2e2; color: #ef4444; transform: rotate(90deg); }

        /* Modal Khusus SOP */
        #sop-box { max-width: 600px; }
        #sop-text { font-family: 'Plus Jakarta Sans'; font-size: 14px; color: var(--text-dark); text-align: left; background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-weight: 500; line-height: 1.7; box-shadow: inset 0 5px 15px rgba(0,0,0,0.03);}
        
        .auth-icon { font-size: 45px; margin-bottom: 20px; background: linear-gradient(135deg, #0ea5e9, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 15px rgba(14,165,233,0.3));}
        .auth-title { font-family: 'Cinzel Decorative', serif; font-size: 28px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        
        .input-group-auth { position: relative; margin-bottom: 18px; }
        .input-group-auth i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 16px;}
        .auth-input { width: 100%; padding: 16px 16px 16px 55px; border-radius: 18px; border: 2px solid rgba(0,0,0,0.05); background: #f8fafc; outline: none; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 14px; transition: var(--transition);}
        .auth-input:focus { border-color: #0ea5e9; background: #fff; box-shadow: 0 0 0 4px rgba(14,165,233,0.15);}
        .auth-input:focus + i { color: #0ea5e9; }
        
        .btn-confirm { width: 100%; padding: 18px; border-radius: 18px; border: none; margin-top: 15px; background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: #fff; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; box-shadow: 0 15px 30px rgba(14,165,233,0.4); transition: var(--transition);}
        .btn-confirm:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(14,165,233,0.5);}

        .empty-task { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 10px; text-align: center; color: #94a3b8; }
        
        @media screen and (max-width: 1200px) { .board-grid { grid-template-columns: repeat(2, 1fr); } }
       @media screen and (max-width: 600px) { 
            body { padding: 15px; } 
            .dashboard-container { padding: 30px 20px; border-radius: 35px; } 
            .board-grid { grid-template-columns: 1fr; gap: 25px;} 
            .header-panel { padding: 25px 20px; justify-content: center; } 
            .header-title-area h1 { font-size: 26px; } 
            .header-title-area p { font-size: 11px; }
            .btn-action-back { left: 15px; width: 42px; height: 42px; font-size: 16px; } 
            .btn-action-back:hover { transform: translateY(-50%) scale(1.05) rotate(0deg); } 
            .board-col { max-height: 550px; } f
            .fab-lapor { bottom: 20px; right: 20px; padding: 14px 20px; font-size: 12px; } 
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    
    <div class="dashboard-container">
        <!-- HEADER MEWAH -->
        <div class="header-panel">
            <a href="hio.html" class="btn-action-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title-area">
                <h1>Command Center</h1>
                <p>Task Board Exclusive</p>
            </div>
            
        </div>

        <!-- KANBAN BOARD -->
        <div class="board-grid">
            <div class="board-col">
                <div class="col-header bg-manager"><span><i class="fas fa-user-tie"></i> Manager</span><span class="col-badge" id="count-Manager">0</span></div>
                <div class="task-list-area" id="list-Manager"></div>
            </div>
            <div class="board-col">
                <div class="col-header bg-admin"><span><i class="fas fa-laptop-code"></i> Admin</span><span class="col-badge" id="count-Admin">0</span></div>
                <div class="task-list-area" id="list-Admin"></div>
            </div>
            <div class="board-col">
                <div class="col-header bg-staff"><span><i class="fas fa-users"></i> Staff</span><span class="col-badge" id="count-Staff">0</span></div>
                <div class="task-list-area" id="list-Staff"></div>
            </div>
            <div class="board-col">
                <div class="col-header bg-elv"><span><i class="fas fa-bolt"></i> ELV</span><span class="col-badge" id="count-ELV">0</span></div>
                <div class="task-list-area" id="list-ELV"></div>
            </div>
        </div>
    </div>

    <!-- TOMBOL LAPOR MELAYANG -->
    <button class="fab-lapor" onclick="bukaGembok('REPORT')">
        <i class="fas fa-paper-plane"></i> Lapor Selesai
    </button>

    <!-- 🔐 MODAL OTENTIKASI & ACC 🔐 -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="btn-close-modal" onclick="tutupSemuaModal()"><i class="fas fa-times"></i></button>
            <i class="fas fa-fingerprint auth-icon"></i>
            <h2 class="auth-title">Otorisasi</h2>
            <p class="auth-desc" id="auth-desc-text" style="color:var(--text-soft); font-weight:600; margin-bottom:25px; font-family:'Plus Jakarta Sans';">Masukkan kredensial divisi Anda.</p>
            
            <form id="authForm">
                <div class="input-group-auth">
                    <input type="text" id="authObjUser" class="auth-input" placeholder="Username Divisi" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group-auth">
                    <input type="password" id="authObjPass" class="auth-input" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <div id="authError" style="color:#ef4444; font-size:12px; margin-top:12px; display:none; font-weight:800; font-family:'Plus Jakarta Sans';">Akses Ditolak!</div>
                
                <button type="submit" class="btn-confirm" id="btn-confirm-text">Verifikasi ACC</button>
            </form>
        </div>
    </div>

    <!-- 📋 MODAL S.O.P DETAIL TUGAS 📋 -->
    <div id="sop-modal" class="modal-overlay">
        <div class="modal-box" id="sop-box">
            <button class="btn-close-modal" onclick="tutupSemuaModal()"><i class="fas fa-times"></i></button>
            <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px;">
                <i class="fas fa-clipboard-check fa-2x" style="color:#0ea5e9"></i>
                <h2 style="font-family: 'Cinzel Decorative'; font-weight:900; font-size:28px; margin:0; color:var(--text-dark);">Mission Briefing</h2>
            </div>
            <div id="sop-title" style="font-weight:800; color:var(--text-dark); margin-bottom:15px; font-size:16px; font-family:'Plus Jakarta Sans'; background:#f1f5f9; padding:10px; border-radius:12px;">Judul Tugas</div>
            <div id="sop-text">Memuat data...</div>
        </div>
    </div>

    <script>
        // 🛠️ DATABASE KREDENSIAL JULDEV 🛠️
        const authData = {
            "jull": { pass: "rijo1307", role: "Owner" }, "anetha": { pass: "net13", role: "Manager" },
            "ayya": { pass: "staff13", role: "Staff" }, "cheyya": { pass: "staff13", role: "Staff" }, "mairaa": { pass: "staff13", role: "Staff" },
            "jelz": { pass: "elv1", role: "ELV" }, "jess": { pass: "elv2", role: "ELV" },
            "lyna": { pass: "admin2121", role: "Admin" }, "ian14": { pass: "admin2121", role: "Admin" }, "idha16": { pass: "admin2121", role: "Admin" }
        };

        const divList = ["Manager", "Admin", "Staff", "ELV"];
        let aksiTertunda = ""; let divisiTertunda = ""; let idTertunda = null;
        let globalTasksData = {}; 

        // 🔥 FIREBASE CLOUD SETUP 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyBuAbkyL3pyvPNWG9u3EyPyhdQn4y7blkc", authDomain: "juldev-command-center.firebaseapp.com",
            databaseURL: "https://juldev-command-center-default-rtdb.firebaseio.com", projectId: "juldev-command-center",
            storageBucket: "juldev-command-center.firebasestorage.app", messagingSenderId: "859594134847", appId: "1:859594134847:web:83a11af82db0095bd22f8a"
        };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        // 📡 ANTENA REAL-TIME
        db.ref('tasks/data').on('value', (snapshot) => {
            globalTasksData = snapshot.val() || { "Manager": [], "Admin": [], "Staff": [], "ELV": [] };
            renderTasksUI(globalTasksData);
        });

        // FUNGSI RENDER VISUAL KANBAN
        function renderTasksUI(dbTugas) {
            // Mapping warna aksen dari CSS Variables
            const accentMap = { "Manager": "var(--c-manager)", "Admin": "var(--c-admin)", "Staff": "var(--c-staff)", "ELV": "var(--c-elv)" };

            divList.forEach(divisi => {
                let wadah = document.getElementById(`list-${divisi}`);
                let dataDivisi = dbTugas[divisi] || [];
                document.getElementById(`count-${divisi}`).innerText = dataDivisi.length;
                wadah.innerHTML = ""; 

                if(dataDivisi.length === 0) {
                    wadah.innerHTML = `<div class="empty-task"><i class="fas fa-shield-alt" style="font-size:45px; color:rgba(0,0,0,0.1); margin-bottom:15px;"></i><span style="font-size:13px; font-weight:700; color:#94a3b8; font-family:'Plus Jakarta Sans';">Belum Ada Tugas</span></div>`;
                } else {
                    [...dataDivisi].reverse().forEach(tugas => {
                        let judulTugas = tugas.judul || tugas.teks || "Tugas Tanpa Judul";
                        let deadlineTugas = tugas.deadline || "";
                        
                        // 🔥 LOGIKA RENDER BADGE (SIAPA YANG UDAH KELAR) 🔥
                        let badgesSelesai = '';
                        if(tugas.selesaiOleh) {
                            badgesSelesai = '<div class="done-by-area">';
                            Object.keys(tugas.selesaiOleh).forEach(namaUser => {
                                badgesSelesai += `<span class="badge-done"><i class="fas fa-check-circle"></i> ${namaUser}</span>`;
                            });
                            badgesSelesai += '</div>';
                        }

                        // Set style inline untuk accent color dynamically
                        let cardColor = accentMap[divisi];

                        wadah.innerHTML += `
                            <div class="task-card" style="--card-accent: ${cardColor};">
                                <div class="task-title">${judulTugas}</div>
                                ${deadlineTugas ? `<div class="task-timer live-timer" data-deadline="${deadlineTugas}"><i class="fas fa-spinner fa-spin"></i> Syncing Waktu...</div>` : ''}
                                
                                ${badgesSelesai}

                                <div class="task-actions">
                                    <button class="btn-neo btn-sop" onclick="bukaSOP('${divisi}', ${tugas.id})"><i class="fas fa-expand-arrows-alt"></i> Briefing</button>
                                    <button class="btn-neo btn-acc" onclick="bukaGembok('ACC', '${divisi}', ${tugas.id})"><i class="fas fa-fingerprint"></i> ACC</button>
                                </div>
                            </div>
                        `;
                    });
                }
            });
            updateTimers(); 
        }

        // ⏳ FUNGSI LIVE COUNTDOWN (DETAK PER DETIK) ⏳
        function updateTimers() {
            document.querySelectorAll('.live-timer').forEach(el => {
                let deadlineStr = el.getAttribute('data-deadline');
                if(!deadlineStr) return;
                
                let deadlineTime = new Date(deadlineStr).getTime();
                let now = new Date().getTime();
                let distance = deadlineTime - now;

                if (distance <= 0) {
                    el.innerHTML = '<i class="fas fa-skull-crossbones"></i> WAKTU HABIS!';
                    el.className = 'task-timer live-timer timer-expired';
                    return;
                }

                let hours = Math.floor(distance / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                el.innerHTML = `<i class="fas fa-stopwatch"></i> ${hours}j ${minutes}m ${seconds}s`;

                // Logika Warna Berdasarkan Sisa Waktu
                if(distance < 3600000) { // Kurang 1 Jam (Pulse Merah)
                    el.className = 'task-timer live-timer timer-danger';
                } else if(distance < 18000000) { // Kurang 5 Jam (Orange)
                    el.className = 'task-timer live-timer timer-warning';
                } else { // Aman (Hijau)
                    el.className = 'task-timer live-timer timer-safe';
                }
            });
        }
        setInterval(updateTimers, 1000); // Muter tiap 1 detik

        // 📋 BUKA MODAL DETAIL SOP
        function bukaSOP(divisi, idTugas) {
            let tugas = globalTasksData[divisi].find(t => t.id === idTugas);
            if(tugas) {
                document.getElementById('sop-title').innerText = tugas.judul || "Detail Tugas";
                document.getElementById('sop-text').innerText = tugas.detail || "Tidak ada rincian briefing. Laksanakan sesuai protokol.";
                document.getElementById('sop-modal').classList.add('show');
            }
        }

        // BUKA MODAL LOGIN
        function bukaGembok(aksi, divisi = "", id = null) {
            aksiTertunda = aksi; divisiTertunda = divisi; idTertunda = id;
            document.getElementById('authObjUser').value = ""; document.getElementById('authObjPass').value = "";
            document.getElementById('authError').style.display = 'none';
            document.getElementById('auth-desc-text').innerText = aksi === 'ACC' ? `Otorisasi cap tugas divisi ${divisi}.` : `Kirim laporan penyelesaian ke Pimpinan.`;
            document.getElementById('btn-confirm-text').innerText = aksi === 'ACC' ? "Verifikasi ACC" : "Kirim Laporan";
            document.getElementById('auth-modal').classList.add('show');
        }

        function tutupSemuaModal() { document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('show')); }

        // ========================================================
        // 🔮 FUNGSI SAKTI UNICODE BOLD 
        // ========================================================
        function teksTebal(text) {
            const boldMap = { 'a':'𝗮','b':'𝗯','c':'𝗰','d':'𝗱','e':'𝗲','f':'𝗳','g':'𝗴','h':'𝗵','i':'𝗶','j':'𝗷','k':'𝗸','l':'𝗹','m':'𝗺','n':'𝗻','o':'𝗼','p':'𝗽','q':'𝗾','r':'𝗿','s':'𝘀','t':'𝘁','u':'𝘂','v':'𝘃','w':'𝘄','x':'𝘅','y':'𝘆','z':'𝘇', 'A':'𝗔','B':'𝗕','C':'𝗖','D':'𝗗','E':'𝗘','F':'𝗙','G':'𝗚','H':'𝗛','I':'𝗜','J':'𝗝','K':'𝗞','L':'𝗟','M':'𝗠','N':'𝗡','O':'𝗢','P':'𝗣','Q':'𝗤','R':'𝗥','S':'𝗦','T':'𝗧','U':'𝗨','V':'𝗩','W':'𝗪','X':'𝗫','Y':'𝗬','Z':'𝗭', '0':'𝟬','1':'𝟭','2':'𝟮','3':'𝟯','4':'𝟰','5':'𝟱','6':'𝟲','7':'𝟳','8':'𝟴','9':'𝟵' };
            return text.split('').map(char => boldMap[char] || char).join('');
        }

        // 🔥 LOGIKA KASTA DEWA (CHECKPOINT & NUKLIR OWNER) 🔥
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let user = document.getElementById('authObjUser').value.trim().toLowerCase();
            let pass = document.getElementById('authObjPass').value.trim().replace(/\s/g, ''); 
            let errorMsg = document.getElementById('authError');

            if(authData[user] && authData[user].pass === pass) {
                let roleLogin = authData[user].role;

                if(aksiTertunda === 'ACC') {
                    
                    if(roleLogin === "Owner") {
                        // KALO OWNER (jull) -> HAPUS TUGAS PERMANEN DARI PAPAN
                        let dataUpdate = {...globalTasksData};
                        dataUpdate[divisiTertunda] = dataUpdate[divisiTertunda].filter(t => t.id !== idTertunda);
                        db.ref('tasks/data').set(dataUpdate); 
                        tutupSemuaModal();

                    } else if (roleLogin === divisiTertunda || roleLogin === "Manager") {
                        // KALO STAF YANG ACC -> NAMBAHIN BADGE NAMA DIA AJA
                        let dataUpdate = {...globalTasksData};
                        let taskIndex = dataUpdate[divisiTertunda].findIndex(t => t.id === idTertunda);
                        
                        if(taskIndex !== -1) {
                            let taskTarget = dataUpdate[divisiTertunda][taskIndex];
                            
                            if(!taskTarget.selesaiOleh) taskTarget.selesaiOleh = {}; // Bikin object kalo blom ada
                            
                            // Cek apakah dia udah pernah ACC?
                            if(taskTarget.selesaiOleh[user]) {
                                errorMsg.innerText = "Kamu sudah menyetorkan misi ini boss!";
                                errorMsg.style.display = 'block';
                                return;
                            }

                            // Kasi stempel nama & jam dia selesai
                            let now = new Date();
                            taskTarget.selesaiOleh[user] = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                            
                            // Tembak balik ke Firebase
                            db.ref('tasks/data').set(dataUpdate).then(() => {
                                tutupSemuaModal();
                                
                                // AUTO LAPOR TELEGRAM SETELAH ACC (Praktis!)
                                let jamLapor = taskTarget.selesaiOleh[user];
                                let pesanFormat = `⚜️ ${teksTebal('MISSION ACCOMPLISHED')} ⚜️\n\nHaloo kak Kayy! 👋\nSaya sudah menyelesaikan misi: *${taskTarget.judul || "Tugas Divisi"}* sesuai dengan S.O.P.\n\n👤 ${teksTebal('Pelapor:')} ${user}\n💼 ${teksTebal('Divisi:')} ${roleLogin}\n⏱️ ${teksTebal('Waktu Selesai:')} ${jamLapor} WIB\n\n_Sistem terverifikasi oleh HIO STATSDAY Web._`;
                                window.open(`https://t.me/kayynl?text=${encodeURIComponent(pesanFormat)}`, '_blank');
                            });
                        }

                    } else {
                        // Kalau divisi lain nyoba ACC tugas divisi orang
                        errorMsg.innerText = `Akses Ditolak! Akun ${roleLogin} tidak berhak atas misi divisi ${divisiTertunda}.`;
                        errorMsg.style.display = 'block';
                    }

                } else if(aksiTertunda === 'REPORT') {
                    // Tombol lapor manual di pojok bawah
                    tutupSemuaModal();
                    let now = new Date();
                    let jamLapor = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                    let pesanFormat = `⚜️ ${teksTebal('EXECUTIVE REPORT')} ⚜️\n\nHaloo kak Kayy! 👋\nTugas dari ${teksTebal('Papan Command')} untuk divisi ${teksTebal(roleLogin)} sudah saya selesaikan semua dengan aman dan terkendali. Terima kasihh! ✨\n\n👤 ${teksTebal('Pelapor:')} ${user}\n💼 ${teksTebal('Divisi:')} ${roleLogin}\n⏱️ ${teksTebal('Waktu Lapor:')} ${jamLapor} WIB\n\n_Sistem terverifikasi oleh HIO STATSDAY Web._`;
                    window.open(`https://t.me/kayynl?text=${encodeURIComponent(pesanFormat)}`, '_blank');
                }
            } else {
                errorMsg.innerText = "Username atau Password salah boss!";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
